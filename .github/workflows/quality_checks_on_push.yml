name: Quality checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run Ruff lint
        run: uv run ruff check --no-fix src tests

  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run Ruff format check
        run: uv run ruff format --check src tests

  ty-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run ty check
        run: uv run ty check src
