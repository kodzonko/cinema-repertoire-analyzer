name: Build Release Binaries

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name to create or update for this release."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: build-binaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BINARY_NAME: app
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.release-metadata.outputs.release_tag }}
      release_target: ${{ steps.release-metadata.outputs.release_target }}
    steps:
      - name: Resolve release metadata
        id: release-metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "release_tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "release_tag=${{ inputs.release_tag }}" >> "${GITHUB_OUTPUT}"
          fi
          echo "release_target=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

  build-linux:
    name: Linux (${{ matrix.artifact_name }})
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            artifact_name: app-manylinux_2_28-x86_64
            asset_name: app-manylinux_2_28-x86_64.tar.gz
            container_image: quay.io/pypa/manylinux_2_28_x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            artifact_name: app-manylinux_2_28-aarch64
            asset_name: app-manylinux_2_28-aarch64.tar.gz
            container_image: quay.io/pypa/manylinux_2_28_aarch64
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-24.04
            artifact_name: app-musllinux_1_2-x86_64
            asset_name: app-musllinux_1_2-x86_64.tar.gz
            container_image: quay.io/pypa/musllinux_1_2_x86_64
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            artifact_name: app-musllinux_1_2-aarch64
            asset_name: app-musllinux_1_2-aarch64.tar.gz
            container_image: quay.io/pypa/musllinux_1_2_aarch64
            target: aarch64-unknown-linux-musl
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - name: Build Linux release binary
        shell: bash
        run: |
          docker run --rm \
            -e HOME=/tmp \
            -e CARGO_HOME=/tmp/cargo \
            -e RUSTUP_HOME=/tmp/rustup \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            "${{ matrix.container_image }}" \
            sh -lc '
              set -eu

              if ! command -v curl >/dev/null 2>&1; then
                if command -v dnf >/dev/null 2>&1; then
                  dnf install -y curl
                elif command -v microdnf >/dev/null 2>&1; then
                  microdnf install -y curl
                elif command -v apk >/dev/null 2>&1; then
                  apk add --no-cache curl
                else
                  echo "curl is required to install rustup." >&2
                  exit 1
                fi
              fi

              curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "${CARGO_HOME}/env"
              rustup target add "${{ matrix.target }}"
              cargo build --locked --release --bin "${{ env.BINARY_NAME }}" --target "${{ matrix.target }}"
            '
          sudo chown -R "$USER":"$USER" target
      - name: Package Linux binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.asset_name }}" "${{ env.BINARY_NAME }}"
      - name: Upload Linux binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  build-native:
    name: Native (${{ matrix.artifact_name }})
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            artifact_name: app-windows-x86_64-msvc
            asset_name: app-windows-x86_64-msvc.zip
            target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/app.exe
          - runner: windows-latest
            artifact_name: app-windows-i686-msvc
            asset_name: app-windows-i686-msvc.zip
            target: i686-pc-windows-msvc
            binary_path: target/i686-pc-windows-msvc/release/app.exe
          - runner: macos-15-intel
            artifact_name: app-macos-15-x86_64
            asset_name: app-macos-15-x86_64.tar.gz
            target: x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/app
          - runner: macos-15
            artifact_name: app-macos-15-arm64
            asset_name: app-macos-15-arm64.tar.gz
            target: aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/app
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build native release binary
        run: cargo build --locked --release --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "${{ matrix.binary_path }}" -DestinationPath "dist/${{ matrix.asset_name }}" -Force
      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C "$(dirname "${{ matrix.binary_path }}")" -czf "dist/${{ matrix.asset_name }}" "$(basename "${{ matrix.binary_path }}")"
      - name: Upload native binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - prepare-release
      - build-linux
      - build-native
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          RELEASE_TARGET: ${{ needs.prepare-release.outputs.release_target }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*)

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" --target "${RELEASE_TARGET}" --generate-notes
          fi
