name: Propozycja funkcji
description: Zasugeruj nową funkcję albo usprawnienie workflow.
title: "[Funkcja]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem do rozwiązania
      description: Najpierw opisz potrzebę użytkownika albo utrudnienie.
      placeholder: Chcę...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proponowana zmiana
      description: Opisz oczekiwane zachowanie CLI, output albo workflow.
    validations:
      required: true
  - type: dropdown
    id: chain
    attributes:
      label: Dotycząca sieć kin
      options:
        - Cinema City
        - Helios
        - Multikino
        - Wiele sieci
        - Niezależne od sieci
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Rozważone alternatywy
      description: Obejścia albo inne podejścia, które już sprawdziłeś.
  - type: textarea
    id: context
    attributes:
      label: Dodatkowy kontekst
      description: Linki, zrzuty ekranu, przykładowy output albo powiązane issues.
