name: Zgłoszenie błędu
description: Zgłoś błąd, regresję albo problem z działaniem scrapera.
title: "[Błąd]: "
labels:
  - bug
body:
  - type: dropdown
    id: chain
    attributes:
      label: Dotknięta sieć kin
      description: Wybierz sieć, w której występuje problem.
      options:
        - Cinema City
        - Helios
        - Multikino
        - Wiele sieci lub nie wiem
    validations:
      required: true
  - type: input
    id: venue
    attributes:
      label: Kino
      description: Nazwa kina albo miasto, jeśli jest znane.
      placeholder: bemowo
  - type: input
    id: date
    attributes:
      label: Data repertuaru
      description: Data albo określenie względne, na przykład dziś lub jutro.
      placeholder: 2026-04-07
  - type: textarea
    id: command
    attributes:
      label: Użyta komenda
      description: Wklej dokładną komendę, która odtwarza problem.
      placeholder: quickrep repertoire --chain helios mokotow 2026-04-07
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Oczekiwane zachowanie
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Rzeczywiste zachowanie
      description: Dołącz istotny output albo szczegóły błędu.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Kroki odtworzenia
      placeholder: |
        1. Uruchom ...
        2. Wybierz ...
        3. Zobacz ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Wersja quickrep
      description: Numer wydania albo SHA commita, jeśli jest znane.
      placeholder: 1.1.0
  - type: input
    id: os
    attributes:
      label: System operacyjny
      placeholder: Windows 11 / macOS 15 / Ubuntu 24.04
  - type: textarea
    id: context
    attributes:
      label: Dodatkowy kontekst
      description: Zrzuty ekranu, linki albo notatki, które mogą pomóc.
